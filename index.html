<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Caption Generator - Compact UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }
        .input-focus-effect:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .btn-base {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.75rem; /* Text-xs equivalent */
        }
        .btn-base:hover {
            transform: translateY(-2px);
        }
        .btn-base:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 15px -2px rgba(37, 99, 235, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 12px -2px rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover {
            box-shadow: 0 8px 15px -2px rgba(16, 185, 129, 0.4);
        }

        .btn-white {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.8);
            color: #475569;
        }
        .btn-white:hover {
            background: #ffffff;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
        }

        .btn-dark {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            box-shadow: 0 4px 12px -2px rgba(30, 41, 59, 0.3);
        }
        .btn-dark:hover {
            box-shadow: 0 8px 15px -2px rgba(30, 41, 59, 0.4);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8 flex items-center justify-center">

    <div class="max-w-6xl w-full">
        <!-- Brand Identity -->
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-xl mb-3 rotate-3 hover:rotate-0 transition-transform duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                </svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800">Caption AI Pro</h1>
            <p class="text-slate-500 text-xs font-medium mt-1 uppercase tracking-widest">Community Enagement Coodinator</p>
        </div>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Side 1: Editor -->
            <div class="lg:col-span-7">
                <div class="premium-card p-6 rounded-[2rem]">
                    <div class="flex items-center justify-between mb-4 px-2">
                        <label for="captionInput" class="text-xs font-bold text-slate-500 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
                            ការរៀបរាប់របស់អ្នក
                        </label>
                        <span class="text-[9px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">Active</span>
                    </div>
                    
                    <textarea id="captionInput" 
                        class="w-full h-72 p-5 bg-white/50 border border-slate-200 rounded-[1.25rem] focus:ring-0 focus:border-blue-400 transition-all outline-none text-slate-700 text-base leading-relaxed custom-scrollbar input-focus-effect"
                        placeholder="សរសេរគំនិតរបស់អ្នកនៅទីនេះ..."></textarea>

                    <!-- Compact Button Grid -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-6">
                        <button onclick="processAI('generate')" class="btn-base btn-primary text-white py-2.5 px-4 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            បង្កើតថ្មី
                        </button>
                        
                        <button onclick="processAI('review')" class="btn-base btn-success text-white py-2.5 px-4 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            ពិនិត្យ
                        </button>

                        <button onclick="processAI('translate_kh')" class="btn-base btn-white py-2.5 px-4 rounded-xl">
                            <span class="text-blue-600 font-bold">ខ្មែរ</span>
                            បកប្រែ
                        </button>

                        <button onclick="processAI('translate_en')" class="btn-base btn-dark text-white py-2.5 px-4 rounded-xl">
                            <span class="text-blue-400 font-bold">EN</span>
                            បកប្រែ
                        </button>
                    </div>
                </div>
            </div>

            <!-- Side 2: Live Result -->
            <div class="lg:col-span-5">
                <div class="premium-card p-6 rounded-[2rem] h-full flex flex-col min-h-[450px] relative overflow-hidden">
                    <div class="flex items-center justify-between mb-4 relative">
                        <h3 class="text-xs font-bold text-slate-800 flex items-center gap-2">
                            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></div>
                            លទ្ធផលទទួលបាន
                        </h3>
                        <div id="actionTools" class="hidden flex items-center gap-1.5 bg-white p-1 rounded-lg shadow-sm border border-slate-100">
                            <button onclick="copyToClipboard()" class="p-1.5 hover:bg-slate-50 text-slate-400 hover:text-blue-600 transition-colors rounded-md" title="ចម្លង">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                            </button>
                            <button onclick="useThisResult()" class="p-1.5 hover:bg-slate-50 text-slate-400 hover:text-emerald-600 transition-colors rounded-md" title="ប្រើប្រាស់លទ្ធផលនេះ">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- States -->
                    <div id="loading" class="hidden flex-grow flex flex-col items-center justify-center">
                        <div class="w-10 h-10 border-[3px] border-blue-50 border-t-blue-600 rounded-full animate-spin"></div>
                        <p class="text-[10px] font-bold text-slate-400 mt-3 tracking-widest uppercase">Processing</p>
                    </div>

                    <div id="placeholderText" class="flex-grow flex flex-col items-center justify-center text-center p-6">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        </div>
                        <h4 class="text-slate-400 font-bold text-xs">រង់ចាំលទ្ធផល</h4>
                    </div>

                    <div id="outputArea" class="hidden flex-grow text-slate-600 leading-relaxed text-sm whitespace-pre-wrap overflow-y-auto custom-scrollbar pr-2"></div>
                </div>
            </div>
        </div>

        <!-- Compact Toast -->
        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur text-white px-5 py-2.5 rounded-xl shadow-xl transition-all duration-500 opacity-0 pointer-events-none flex items-center gap-2">
            <div class="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
            </div>
            <span id="toastMsg" class="text-xs font-bold tracking-wide"></span>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyBDn2VBbAUZeSbM63iCTQqTxU0-Lk9vhmg"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        async function processAI(mode) {
            const userInput = document.getElementById('captionInput').value.trim();
            const outputArea = document.getElementById('outputArea');
            const placeholderText = document.getElementById('placeholderText');
            const loading = document.getElementById('loading');
            const actionTools = document.getElementById('actionTools');

            if (!userInput) {
                showToast("សូមបញ្ចូលអត្ថបទសិន!");
                return;
            }

            loading.classList.remove('hidden');
            outputArea.classList.add('hidden');
            placeholderText.classList.add('hidden');
            actionTools.classList.add('hidden');

            let systemPrompt = "You are a professional social media manager for an NGO. Write impactful and inspiring captions. Use emojis appropriately.";
            let userPrompt = "";

            switch(mode) {
                case 'generate':
                    userPrompt = `Based on: "${userInput}", write 3 diverse social media caption options (Empathetic, Action-oriented, and Concise). Include hashtags. Respond in the same language as input.`;
                    break;
                case 'review':
                    userPrompt = `Review and improve the professional tone and grammar of: "${userInput}". Provide only the final corrected version.`;
                    break;
                case 'translate_kh':
                    userPrompt = `Translate this to formal and professional Khmer: "${userInput}".`;
                    break;
                case 'translate_en':
                    userPrompt = `Translate this to professional English: "${userInput}".`;
                    break;
            }

            try {
                const response = await callGemini(userPrompt, systemPrompt);
                outputArea.textContent = response;
                outputArea.classList.remove('hidden');
                actionTools.classList.remove('hidden');
            } catch (error) {
                outputArea.textContent = "Error: មិនអាចទាក់ទង AI បានទេ។";
                outputArea.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        async function callGemini(prompt, systemInstruction) {
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    if (i === 4) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('outputArea').textContent;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("បានចម្លងជោគជ័យ!");
        }

        function useThisResult() {
            const text = document.getElementById('outputArea').textContent;
            document.getElementById('captionInput').value = text;
            showToast("បានបញ្ចូលទៅកាន់ប្រអប់កែសម្រួល!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }
    </script>
</body>
</html>
